<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Hat — כניסה</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">BLACK HAT</a>
    <div class="nav-links">
      <a href="index.html">בית</a>
    </div>
  </nav>

  <!-- ===== LOGIN FORM ===== -->
  <div class="login-wrapper">
    <div class="login-box">

      <div class="login-header">
        <div class="hero-tag">// ACCESS REQUIRED</div>
        <h1 class="login-title">כניסה למערכת</h1>
      </div>

      <!-- Error message (hidden until there is an error) -->
      <div class="form-error" id="error-msg" style="display:none;"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">אימייל</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">סיסמה</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary btn-large" id="submit-btn">
          כניסה ←
        </button>
      </form>

      <p class="login-note">אין לך חשבון עדיין? <a href="index.html#pricing">רכוש גישה</a></p>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      var email    = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var errorDiv = document.getElementById('error-msg');
      var submitBtn = document.getElementById('submit-btn');

      // Disable button while waiting
      submitBtn.textContent = 'מתחבר...';
      submitBtn.disabled = true;
      errorDiv.style.display = 'none';

      try {
        var res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });

        var data = await res.json();

        if (res.ok && data.success) {
          // Redirect to lessons dashboard
          window.location.href = '/dashboard.html';
        } else {
          errorDiv.textContent = data.error || 'שגיאה בכניסה';
          errorDiv.style.display = 'block';
          submitBtn.textContent = 'כניסה ←';
          submitBtn.disabled = false;
        }
      } catch (err) {
        errorDiv.textContent = 'שגיאת חיבור — נסה שוב';
        errorDiv.style.display = 'block';
        submitBtn.textContent = 'כניסה ←';
        submitBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
